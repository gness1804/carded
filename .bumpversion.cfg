[bumpversion]
current_version = 0.2.0
commit = False
tag = False

# Keep these two version strings in sync. pyproject.toml is the authoritative
# project metadata; app.py:__version__ is what's surfaced at runtime (in
# /health and in the UI footer via templates.env.globals).
#
# Usage:
#   bump2version patch    # 0.2.0 -> 0.2.1
#   bump2version minor    # 0.2.0 -> 0.3.0
#   bump2version major    # 0.2.0 -> 1.0.0
#   bump2version --dry-run --verbose patch    # preview
#
# Then review with `git diff`, commit, and push. We intentionally do NOT
# auto-commit/tag here — Graham reviews and commits. (bump2version rewrites
# this file and drops comments; re-add this block if it bumps again. Pass
# --no-commit --no-tag to be safe regardless of config.)

[bumpversion:file:pyproject.toml]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:app.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"
